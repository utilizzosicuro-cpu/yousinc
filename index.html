<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youSinc - Registra il tuo momento</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        #upload-btn { background: #007bff; color: white; border: none; padding: 15px 20px; border-radius: 50px; cursor: pointer; font-size: 16px; width: 100%; }
        #status { margin-top: 20px; color: #666; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>youSinc</h1>
    <p>Inserisci il tuo Nickname per la firma video:</p>
    <input type="text" id="nickname" placeholder="Esempio: Marco88" required>
    
    <div id="upload-area">
        <p>Riprendi l'evento:</p>
        <input type="file" id="video-input" accept="video/*" capture="camera" style="display: none;">
        <button id="upload-btn" onclick="document.getElementById('video-input').click()">🎥 REGISTRA VIDEO</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const videoInput = document.getElementById('video-input');
    const status = document.getElementById('status');
    
    // CONFIGURAZIONE CLOUDINARY
    const CLOUD_NAME = "dyh5estbo"; 
    const UPLOAD_PRESET = "yousinc_preset";

    videoInput.addEventListener('change', async function() {
        const nickname = document.getElementById('nickname').value;
        
        if(!nickname) {
            alert("Per favore, inserisci prima un nickname!");
            return;
        }

        const file = videoInput.files[0];
        if (!file) return;

        status.innerText = "🚀 Caricamento in corso per " + nickname + "... non chiudere la pagina.";
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('tags', nickname); 

        try {
            // CORREZIONE: Qui usiamo la variabile CLOUD_NAME che contiene il tuo ID
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                status.innerHTML = `✅ Ottimo lavoro <b>${nickname}</b>!<br>Video inviato con successo.`;
                console.log("URL Video Originale:", data.secure_url);
            } else {
                // Se c'è un errore, mostriamo il messaggio di Cloudinary per capire cosa non va
                status.innerText = "❌ Errore Cloudinary: " + (data.error ? data.error.message : "Sconosciuto");
                console.error("Errore Dettagliato:", data);
            }
        } catch (error) {
            console.error("Errore Connessione:", error);
            status.innerText = "❌ Errore di connessione al server.";
        }
    });
</script>

</body>
</html>
